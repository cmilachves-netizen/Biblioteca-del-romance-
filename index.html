<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Romance Library PRO</title>

<style>

body{
margin:0;
font-family:Arial;
background: linear-gradient(135deg,#fde2e4,#fff1e6,#f8edeb);
color:#3b2f2f;
}

/* HEADER */
header{
background:#be123c;
color:white;
text-align:center;
padding:25px;
font-size:28px;
font-weight:bold;
}

.sub{
text-align:center;
margin-top:-10px;
color:#7a1f2b;
}

/* SEARCH */
.searchBox{
text-align:center;
margin:20px;
}

input{
padding:12px;
width:60%;
max-width:400px;
border-radius:10px;
border:none;
outline:none;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
padding:20px;
}

/* CARD */
.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
}

img{
width:100%;
height:320px;
object-fit:cover;
}

/* CONTENT */
.content{
padding:15px;
}

h2{
color:#be123c;
font-size:18px;
margin:5px 0;
}

small{
color:#6b7280;
}

/* BUTTONS */
button{
margin-top:10px;
padding:8px 10px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
margin-right:5px;
}

.btn1{
background:#ef4444;
color:white;
}

.btn2{
background:#f59e0b;
color:black;
}

.btn1:hover{background:#b91c1c;}
.btn2:hover{background:#d97706;}

/* DESCRIPTION */
.info{
display:none;
margin-top:10px;
font-size:14px;
line-height:1.4;
color:#374151;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<header>💖 Romance Library PRO</header>
<p class="sub">Colección premium de libros románticos 📚</p>

<div class="searchBox">
<input type="text" id="buscador" placeholder="🔎 Buscar libro o autor..." onkeyup="filtrar()">
</div>

<div class="container" id="lista"></div>

<script>

const libros = [

{
titulo:"El mapa de los anhelos",
autor:"Alice Kellen",
anio:"2022",
img:"https://m.media-amazon.com/images/I/81pQ7+G1QvL.jpg",
desc:"Una historia de amor, pérdida y autodescubrimiento emocional profundo.",
link:"https://avifyshop.com/cr/elmapadelosanhelosalicekellen.html"
},

{
titulo:"Orgullo y Prejuicio",
autor:"Jane Austen",
anio:"1813",
img:"https://m.media-amazon.com/images/I/81z4fQ4X0eL.jpg",
desc:"Clásico romance entre Elizabeth Bennet y Mr. Darcy lleno de orgullo y prejuicios sociales.",
link:"https://librerialannister.com/product/orgullo-y-prejuicio-3/"
},

{
titulo:"Sentido y Sensibilidad",
autor:"Jane Austen",
anio:"1811",
img:"https://m.media-amazon.com/images/I/91HHxxtA1wL.jpg",
desc:"Dos hermanas enfrentan amor, pérdidas y la sociedad victoriana.",
link:"https://www.akal.com/libro/sentido-y-sensibilidad-edicion-anotada_55105/"
},

{
titulo:"Cartas a los perdidos",
autor:"Brigid Kemmerer",
anio:"2017",
img:"https://m.media-amazon.com/images/I/81Q0A1k0F3L.jpg",
desc:"Dos jóvenes conectan a través de cartas sin conocerse.",
link:"https://www.oceano.com.ec/online/index.php?id_product=10797&controller=product"
},

{
titulo:"El día que dejó de nevar en Alaska",
autor:"Alice Kellen",
anio:"2017",
img:"https://m.media-amazon.com/images/I/81wG+f5Q3hL.jpg",
desc:"Una historia de segundas oportunidades en un lugar frío pero emocionalmente cálido.",
link:"https://www.encantadalibros.ar/productos/el-dia-que-dejo-de-nevar-en-alaska-alice-kellen-edicion-tapa-dura-pocket/"
},

{
titulo:"Si fuéramos eternos",
autor:"Emma Gil",
anio:"Contemporáneo",
img:"https://m.media-amazon.com/images/I/81c0dQp4FHL.jpg",
desc:"Un amor que desafía el tiempo y las decisiones de la vida.",
link:"https://www.planetadelibros.us/libro-si-fueramos-eternos/443039"
},

{
titulo:"El arte de ser nosotros",
autor:"Inma Rubiales",
anio:"2022",
img:"https://m.media-amazon.com/images/I/81Q8d7yQ6DL.jpg",
desc:"Dos almas rotas que se encuentran para sanar juntas.",
link:"https://escritoras.com/libros/si-fueramos-eternos"
},

{
titulo:"Mejor que en las películas",
autor:"Lynn Painter",
anio:"2021",
img:"https://m.media-amazon.com/images/I/81nKQ2Q0gVL.jpg",
desc:"El amor real vs las expectativas del amor ideal.",
link:"https://www.amazon.com"
}

];

function render(data=libros){

let cont=document.getElementById("lista");
cont.innerHTML="";

data.forEach((l,i)=>{

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<img src="${l.img}" onerror="this.src='https://via.placeholder.com/400x600?text=Libro'">

<div class="content">

<h2>${l.titulo}</h2>
<small>${l.autor} • ${l.anio}</small>

<button class="btn1" onclick="toggle(this)">📖 Ver</button>
<button class="btn2" onclick="window.open('${l.link}','_blank')">🔗 Comprar</button>

<div class="info">
<p>${l.desc}</p>
</div>

</div>
`;

cont.appendChild(div);
});

}

function toggle(btn){
let info = btn.parentElement.querySelector(".info");
info.style.display = info.style.display==="block"?"none":"block";
}

function filtrar(){
let texto = document.getElementById("buscador").value.toLowerCase();

let filtrados = libros.filter(l =>
l.titulo.toLowerCase().includes(texto) ||
l.autor.toLowerCase().includes(texto)
);

render(filtrados);
}

render();

</script>

</body>
</html>
